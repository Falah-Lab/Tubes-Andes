<!DOCTYPE html>
<html lang="id">
<head>
<meta charset="UTF-8"/>
<meta name="viewport" content="width=device-width, initial-scale=1.0"/>
<title>AquaMonitor — Sistem Monitoring Tangki Air</title>
<link href="https://fonts.googleapis.com/css2?family=Space+Mono:wght@400;700&family=Syne:wght@400;600;800&display=swap" rel="stylesheet"/>
<style>
:root {
  --bg:      #0a192f;
  --bg2:     #112240;
  --bg3:     #233554;
  --border:  #1c2a3a;
  --cyan:    #00e5ff;
  --cyan2:   #0099bb;
  --green:   #00ff88;
  --yellow:  #ffd000;
  --red:     #ff3a3a;
  --text:    #b8d4e8;
  --dim:     #3a5a72;
  --mono:    'Space Mono', monospace;
  --sans:    'Syne', sans-serif;
}
*{margin:0;padding:0;box-sizing:border-box;}
html,body{height:100%;background:var(--bg);color:var(--text);font-family:var(--sans);}
body::after{content:'';position:fixed;inset:0;pointer-events:none;z-index:999;background:repeating-linear-gradient(0deg,transparent,transparent 2px,rgba(0,0,0,.05) 2px,rgba(0,0,0,.05) 4px);}
body::before{content:'';position:fixed;inset:0;pointer-events:none;z-index:0;background-image:linear-gradient(var(--border) 1px,transparent 1px),linear-gradient(90deg,var(--border) 1px,transparent 1px);background-size:48px 48px;opacity:.25;}
.wrap{position:relative;z-index:1;max-width:1100px;margin:0 auto;padding:32px 24px;}

/* HEADER */
header{display:flex;align-items:flex-start;justify-content:space-between;margin-bottom:40px;gap:16px;flex-wrap:wrap;}
.logo-img{height:80px;object-fit:contain;border-radius:4px;}
.tagline{font-family:var(--mono);font-size:.6rem;letter-spacing:3px;color:var(--dim);margin-top:6px;}
.conn-badge{display:flex;align-items:center;gap:8px;background:var(--bg3);border:1px solid var(--border);border-radius:4px;padding:8px 14px;font-family:var(--mono);font-size:.7rem;}
.dot{width:7px;height:7px;border-radius:50%;background:var(--green);box-shadow:0 0 10px var(--green);animation:blink 2s ease-in-out infinite;}
.dot.err{background:var(--red);box-shadow:0 0 10px var(--red);}
@keyframes blink{0%,100%{opacity:1}50%{opacity:.25}}

/* JAM BESAR */
.jam-display{font-family:var(--mono);font-size:1rem;letter-spacing:4px;color:var(--dim);text-align:right;margin-top:4px;}

/* GRID */
.grid{display:grid;grid-template-columns:280px 1fr;grid-template-rows:auto auto;gap:20px;}
@media(max-width:700px){
  .grid{grid-template-columns:1fr;}
  .piezo-row{justify-content:center;}
  .panel{text-align:center;}
  .log-panel{text-align:center;}
  .log-header{flex-direction:column; justify-content:center !important; gap:12px;}
  .log-line{justify-content:center;}
}
.log-header{display:flex; justify-content:space-between; align-items:center; margin-bottom:14px;}

/* PANEL */
.panel{background:var(--bg2);border:1px solid var(--border);border-radius:2px;padding:24px;position:relative;}
.panel::before{content:'';position:absolute;top:0;left:0;right:0;height:2px;background:linear-gradient(90deg,transparent,var(--cyan),transparent);}
.panel-lbl{font-family:var(--mono);font-size:.58rem;letter-spacing:3px;color:var(--dim);margin-bottom:16px;}

/* TANK */
.tank-panel{grid-row:1/3;display:flex;flex-direction:column;align-items:center;gap:18px;}
.tank-pipe{width:18px;height:28px;background:var(--bg3);border:1px solid var(--border);border-bottom:none;margin:0 auto;}
.tank-body{width:130px;height:240px;border:2px solid var(--cyan2);border-radius:3px 3px 8px 8px;position:relative;overflow:hidden;background:var(--bg);}
.tank-fill{position:absolute;bottom:0;left:0;right:0;height:0%;transition:height 2s cubic-bezier(.4,0,.2,1);overflow:hidden;}
.tank-fill::before{content:'';position:absolute;top:-8px;left:-40%;width:180%;height:16px;background:radial-gradient(ellipse at center,rgba(0,229,255,.45) 0%,transparent 70%);border-radius:50%;animation:wave 2.5s ease-in-out infinite;}
@keyframes wave{0%,100%{transform:translateX(0) scaleY(1)}50%{transform:translateX(6%) scaleY(1.3)}}
.tank-pct{position:absolute;inset:0;display:flex;align-items:center;justify-content:center;font-family:var(--mono);font-size:2.2rem;font-weight:700;color:#fff;}
.tank-marks{position:absolute;right:-34px;top:0;height:100%;display:flex;flex-direction:column;justify-content:space-between;}
.mark{font-family:var(--mono);font-size:.5rem;color:var(--dim);display:flex;align-items:center;gap:4px;}
.mark::before{content:'';display:block;width:8px;height:1px;background:var(--border);}
.tank-wrap{position:relative;width:130px;}

/* STATUS BADGE */
.status-badge{font-family:var(--mono);font-size:.7rem;letter-spacing:4px;padding:6px 18px;border:1px solid currentColor;border-radius:2px;transition:color .8s,border-color .8s;}

/* LED */
.led-row{display:flex;gap:16px;}
.led-item{display:flex;flex-direction:column;align-items:center;gap:5px;}
.led{width:18px;height:18px;border-radius:50%;border:2px solid;opacity:.15;transition:opacity .5s,box-shadow .5s;}
.led.on{opacity:1;}
.led.merah{border-color:var(--red);background:var(--red);}
.led.kuning{border-color:var(--yellow);background:var(--yellow);}
.led.hijau{border-color:var(--green);background:var(--green);}
.led.merah.on{box-shadow:0 0 12px var(--red);}
.led.kuning.on{box-shadow:0 0 12px var(--yellow);}
.led.hijau.on{box-shadow:0 0 12px var(--green);}
.led-lbl{font-family:var(--mono);font-size:.5rem;color:var(--dim);}

/* PIEZO */
.piezo-row{display:flex;align-items:center;gap:10px;width:100%;}
.piezo-icon{width:30px;height:30px;border-radius:50%;border:1.5px solid var(--dim);display:flex;align-items:center;justify-content:center;font-size:13px;color:var(--dim);transition:all .4s;flex-shrink:0;}
.piezo-icon.active{border-color:var(--red);color:var(--red);animation:pz .4s ease-in-out infinite alternate;}
@keyframes pz{from{transform:scale(1)}to{transform:scale(1.2)}}
.piezo-txt{font-family:var(--mono);font-size:.62rem;color:var(--dim);}
.piezo-txt.active{color:var(--red);}

/* BTN ALARM */
.btn-alarm{width:100%;padding:10px;border-radius:2px;border:1px solid var(--dim);background:transparent;color:var(--dim);font-family:var(--mono);font-size:.65rem;letter-spacing:2px;cursor:not-allowed;transition:all .4s;}
.btn-alarm.active{border-color:var(--red);color:#fff;background:var(--red);cursor:pointer;animation:ring 1.5s ease-in-out infinite;}
.btn-alarm.active:hover{background:#cc2222;animation:none;}
@keyframes ring{0%,100%{box-shadow:0 0 0 0 rgba(255,58,58,.4)}50%{box-shadow:0 0 0 8px rgba(255,58,58,0)}}

/* STATS */
.stat-grid{display:grid;grid-template-columns:1fr 1fr;gap:12px;margin-top:14px;}
.stat{background:var(--bg3);border:1px solid var(--border);border-radius:2px;padding:14px;}
.stat-lbl{font-family:var(--mono);font-size:.55rem;letter-spacing:2px;color:var(--dim);margin-bottom:6px;}
.stat-val{font-family:var(--mono);font-size:1.3rem;font-weight:700;color:var(--cyan);transition:color .8s;}
.stat-val small{font-size:.6rem;color:var(--dim);margin-left:2px;}
.prog-wrap{height:3px;background:var(--border);border-radius:2px;margin-top:16px;overflow:hidden;}
.prog-bar{height:100%;border-radius:2px;transition:width 2s cubic-bezier(.4,0,.2,1),background .8s;}

/* LOG */
.log-panel{background:var(--bg2);border:1px solid var(--border);border-radius:2px;padding:24px;position:relative;}
.log-panel::before{content:'';position:absolute;top:0;left:0;right:0;height:2px;background:linear-gradient(90deg,transparent,var(--cyan),transparent);}
.log-box{height:120px;overflow-y:auto;background:var(--bg);border:1px solid var(--border);border-radius:2px;padding:10px 14px;margin-top:14px;}
.log-box::-webkit-scrollbar{width:3px;}
.log-box::-webkit-scrollbar-thumb{background:var(--border);}
.log-line{display:flex;gap:10px;font-family:var(--mono);font-size:.62rem;line-height:1.9;}
.log-time{color:var(--dim);min-width:52px;}
.KOSONG{color:var(--red);}
.RENDAH{color:var(--yellow);}
.SEDANG{color:var(--cyan);}
.PENUH{color:var(--green);}
.log-info{color:var(--dim);}
.btn-reset{background:transparent;border:1px solid var(--dim);color:var(--dim);font-family:var(--mono);font-size:.55rem;letter-spacing:1px;padding:4px 8px;border-radius:2px;cursor:pointer;transition:all .3s;}
.btn-reset:hover{color:var(--cyan);border-color:var(--cyan);}
</style>
</head>
<body>
<div class="wrap">

  <header>
    <div style="display:flex; align-items:center; gap:16px;">
      <img src="logo.png" alt="Logo AquaMonitor" class="logo-img" />
      <div style="display:flex; flex-direction:column; justify-content:center;">
        <div style="font-family:var(--sans); font-weight:800; font-size:2.2rem; letter-spacing:-1px;">
          <div style="color:var(--cyan); line-height:1;">AQUA</div>
          <div style="color:#fff; line-height:1; font-size:1.1rem; letter-spacing:3px; margin-top:2px;">MONITORING</div>
        </div>
        <div class="tagline" style="margin-top:6px;">SISTEM MONITORING TOREN </div>
      </div>
    </div>
    <div style="text-align:right;">
      <div class="conn-badge">
        <div class="dot" id="conn-dot"></div>
        <span id="conn-label">MENGHUBUNGKAN...</span>
      </div>
    </div>
  </header>

  <div class="grid">

    <!-- TANK -->
    <div class="panel tank-panel">
      <div class="panel-lbl">VISUALISASI TOREN</div>

      <div class="tank-wrap">
        <div class="tank-pipe"></div>
        <div class="tank-body">
          <div class="tank-fill" id="tank-fill"></div>
          <div class="tank-pct" id="tank-pct"><img src="logo.png" style="width: 70px; opacity: 0.9;" /></div>
        </div>
        <div class="tank-marks">
          <div class="mark">100</div>
          <div class="mark">75</div>
          <div class="mark">50</div>
          <div class="mark">25</div>
          <div class="mark">0</div>
        </div>
      </div>

      <div class="status-badge" id="status-badge" style="color:var(--cyan)">MEMUAT...</div>

      <div class="led-row">
        <div class="led-item"><div class="led merah" id="led-merah"></div><div class="led-lbl">KOSONG</div></div>
        <div class="led-item"><div class="led kuning" id="led-kuning"></div><div class="led-lbl">RENDAH</div></div>
        <div class="led-item"><div class="led hijau" id="led-hijau"></div><div class="led-lbl">NORMAL</div></div>
      </div>

      <div class="piezo-row">
        <div class="piezo-icon" id="piezo-icon">♪</div>
        <div class="piezo-txt" id="piezo-txt">ALARAM : DIAM</div>
      </div>

      <button class="btn-alarm" id="btn-alarm" disabled onclick="matikanAlarm()">
        MATIKAN ALARM
      </button>
    </div>

    <!-- STATS -->
    <div class="panel">
      <div class="panel-lbl">DATA REALTIME</div>
      <div class="stat-grid">
        <div class="stat">
          <div class="stat-lbl">SISA AIR</div>
          <div class="stat-val" id="s-persen">--<small>%</small></div>
        </div>
        <div class="stat">
          <div class="stat-lbl">STATUS</div>
          <div class="stat-val" style="font-size:1rem;" id="s-status">--</div>
        </div>
        <div class="stat" style="grid-column: 1 / -1; text-align: center;">
          <div class="stat-lbl">WAKTU</div>
          <div class="stat-val" style="font-size:1rem;" id="s-jam">--:--:--</div>
        </div>
      </div>
      <div class="prog-wrap">
        <div class="prog-bar" id="prog-bar" style="width:0%;background:var(--cyan)"></div>
      </div>
    </div>

    <!-- LOG -->
    <div class="log-panel">
      <div class="log-header">
        <div class="panel-lbl" style="margin-bottom:0;">LOG AKTIVITAS</div>
        <button class="btn-reset" onclick="resetDatabase()">RESET DATABASE</button>
      </div>
      <div class="log-box" id="log-box">
        <div class="log-line"><span class="log-time">--:--:--</span><span class="log-info">Menunggu data dari Arduino...</span></div>
      </div>
    </div>

  </div>
</div>

<script>
let lastStatus  = '';
let alarmDiam   = false;

// Jam lokal berjalan terus walau server mati
function jamLokal() {
  const now = new Date();
  const hh = String(now.getHours()).padStart(2,'0');
  const mm = String(now.getMinutes()).padStart(2,'0');
  const ss = String(now.getSeconds()).padStart(2,'0');
  return `${hh}:${mm}:${ss}`;
}

// Update jam display setiap detik dari JS (tidak tunggu server)
setInterval(() => {
  const j = jamLokal();
  const sJam = document.getElementById('s-jam');
  if (sJam) sJam.textContent = j;
}, 1000);

function warna(p) {
  if (p <= 20) return 'var(--red)';
  if (p <= 50) return 'var(--yellow)';
  return 'var(--green)';
}

function updateUI(data) {
  const { status, persen, jarak } = data;
  const w = warna(persen);
  const isErr = status === 'ERROR' || status === 'TIDAK TERHUBUNG';

  // Koneksi dot
  const dot = document.getElementById('conn-dot');
  const lbl = document.getElementById('conn-label');
  if (isErr) {
    dot.className = 'dot err';
    lbl.textContent = status === 'TIDAK TERHUBUNG' ? 'ARDUINO TIDAK TERHUBUNG' : 'SENSOR ERROR';
    lbl.style.color = 'var(--red)';
  } else {
    dot.className = 'dot';
    lbl.textContent = 'ARDUINO TERHUBUNG';
    lbl.style.color = 'var(--green)';
  }

  // Tangki
  const fill = document.getElementById('tank-fill');
  fill.style.height = persen + '%';
  fill.style.background = `rgba(0,140,180,${0.2 + persen/280})`;

  // Status badge
  const sb = document.getElementById('status-badge');
  sb.textContent = isErr ? 'OFFLINE' : status;
  sb.style.color = isErr ? 'var(--dim)' : w;

  // Stats
  document.getElementById('s-persen').innerHTML = persen + '<small>%</small>';
  document.getElementById('s-persen').style.color = isErr ? 'var(--dim)' : w;
  document.getElementById('s-status').textContent = status;
  document.getElementById('s-status').style.color = isErr ? 'var(--dim)' : w;

  // Progress bar
  const pb = document.getElementById('prog-bar');
  pb.style.width = persen + '%';
  pb.style.background = isErr ? 'var(--dim)' : w;

  // LED
  document.getElementById('led-merah').className  = 'led merah'  + (!isErr && persen <= 20 ? ' on' : '');
  document.getElementById('led-kuning').className = 'led kuning' + (!isErr && persen > 20 && persen <= 50 ? ' on' : '');
  document.getElementById('led-hijau').className  = 'led hijau'  + (!isErr && persen > 50 ? ' on' : '');

  // Reset alarmDiam jika air naik dari kosong
  if (lastStatus === 'KOSONG' && status !== 'KOSONG') {
    alarmDiam = false;
    resetBtn();
  }

  // Piezo & tombol alarm
  const piezoOn = !isErr && persen <= 20 && !alarmDiam;
  const pi = document.getElementById('piezo-icon');
  const pt = document.getElementById('piezo-txt');
  const btn = document.getElementById('btn-alarm');

  if (piezoOn) {
    pi.className  = 'piezo-icon active';
    pt.className  = 'piezo-txt active';
    pt.textContent = 'PIEZO : AKTIF';
    btn.className  = 'btn-alarm active';
    btn.disabled   = false;
    btn.textContent = 'MATIKAN ALARM';
  } else {
    pi.className  = 'piezo-icon';
    pt.className  = 'piezo-txt';
    pt.textContent = alarmDiam ? 'PIEZO : DIMATIKAN' : 'PIEZO : DIAM';
    if (!alarmDiam) resetBtn();
  }

  // Log hanya jika status berubah dan bukan error
  if (status !== lastStatus && !isErr) {
    lastStatus = status;
    const box  = document.getElementById('log-box');
    const line = document.createElement('div');
    line.className = 'log-line';
    line.innerHTML = `<span class="log-time">${jamLokal()}</span><span class="${status}">${status}</span><span class="log-info" style="margin-left:8px">→ ${persen}% | ${jarak} cm</span>`;
    box.appendChild(line);
    box.scrollTop = box.scrollHeight;
  }
}

function resetBtn() {
  const btn = document.getElementById('btn-alarm');
  btn.className   = 'btn-alarm';
  btn.disabled    = true;
  btn.textContent = 'MATIKAN ALARM';
}

// Konfigurasi Supabase
const SUPABASE_URL = "https://cczjlxluqvwvvijvyawk.supabase.co";
const SUPABASE_KEY = "sb_publishable_2hda1xyT_AFdeKmkteNMVA_As_w4qY9";
const HEADERS = {
  "apikey": SUPABASE_KEY,
  "Authorization": `Bearer ${SUPABASE_KEY}`,
  "Content-Type": "application/json"
};

async function matikanAlarm() {
  alarmDiam = true;
  const btn = document.getElementById('btn-alarm');
  btn.className   = 'btn-alarm';
  btn.disabled    = true;
  btn.textContent = 'ALARM SUDAH DIMATIKAN';
  document.getElementById('piezo-icon').className = 'piezo-icon';
  document.getElementById('piezo-txt').className  = 'piezo-txt';
  document.getElementById('piezo-txt').textContent = 'PIEZO : DIMATIKAN';
  
  try {
    // Matikan alarm yang belum selesai di Supabase
    const url = `${SUPABASE_URL}/rest/v1/log_alarm?waktu_selesai=is.null`;
    const now = new Date();
    const ts = now.toISOString().replace('T', ' ').substring(0, 19); // YYYY-MM-DD HH:MM:SS
    const body = { waktu_selesai: ts, cara_selesai: 'MANUAL (WEB VERCEL)' };
    await fetch(url, { method: 'PATCH', headers: HEADERS, body: JSON.stringify(body) });
  } catch(e) {}
}

async function resetDatabase() {
  if(!confirm('Apakah Anda yakin ingin mereset semua data riwayat dari database kembali ke 0?')) return;
  try {
    await fetch(`${SUPABASE_URL}/rest/v1/log_level_air?id=gte.0`, { method: 'DELETE', headers: HEADERS });
    await fetch(`${SUPABASE_URL}/rest/v1/log_alarm?id=gte.0`, { method: 'DELETE', headers: HEADERS });
    alert('Database berhasil direset ke 0!');
    document.getElementById('log-box').innerHTML = '<div class="log-line"><span class="log-info">Database direset. Menunggu data...</span></div>';
  } catch(e) {
    alert('Gagal mereset database!');
  }
}

async function fetchData() {
  try {
    // Ambil 1 baris terakhir dari log_level_air
    const url = `${SUPABASE_URL}/rest/v1/log_level_air?order=id.desc&limit=1`;
    const res = await fetch(url, { headers: HEADERS });
    const rows = await res.json();
    
    // Cek status alarm dari Supabase agar sinkron antara HP & Laptop
    const resAlarm = await fetch(`${SUPABASE_URL}/rest/v1/log_alarm?order=id.desc&limit=1`, { headers: HEADERS });
    const rowsAlarm = await resAlarm.json();
    if (rowsAlarm && rowsAlarm.length > 0) {
      if (rowsAlarm[0].waktu_selesai !== null) {
        alarmDiam = true;
      } else {
        alarmDiam = false;
      }
    }
    
    if (rows && rows.length > 0) {
      const r = rows[0];
      
      // Deteksi jika Arduino mati/dicabut (data tidak update selama > 8 detik)
      const lastUpdate = new Date(r.waktu.replace(' ', 'T'));
      const now = new Date();
      const diffSecs = (now - lastUpdate) / 1000;
      
      if (diffSecs > 8) {
        updateUI({ status: 'TIDAK TERHUBUNG', persen: 0, jarak: 0, jam: r.waktu ? r.waktu.split(' ')[1] : jamLokal() });
      } else {
        const data = {
          status: r.status,
          persen: r.persen,
          jarak: r.jarak_cm,
          jam: r.waktu ? r.waktu.split(' ')[1] : jamLokal()
        };
        updateUI(data);
      }
    } else {
      updateUI({ status: 'KOSONG', persen: 0, jarak: 0, jam: '--:--:--' });
    }
  } catch(e) {
    document.getElementById('conn-dot').className = 'dot err';
    document.getElementById('conn-label').textContent = 'SERVER TIDAK TERHUBUNG';
    document.getElementById('conn-label').style.color = 'var(--red)';
  }
}

fetchData();
setInterval(fetchData, 1000);
</script>
</body>
</html>
